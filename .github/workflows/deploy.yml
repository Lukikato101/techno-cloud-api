name: CI/CD Deploy

on:
  push:
    branches: [ "main" ]

jobs:

  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_KEY }}
          aws-region: us-east-1

      - name: Login ECR
        run: |
          aws ecr get-login-password --region us-east-1 \
          | docker login --username AWS --password-stdin 674594307110.dkr.ecr.us-east-1.amazonaws.com

      - name: Build Image
        run: |
          docker build -t techno-api .

      - name: Tag Image
        run: |
          docker tag techno-api:latest \
          674594307110.dkr.ecr.us-east-1.amazonaws.com/techno-api:latest

      - name: Push Image
        run: |
          docker push 674594307110.dkr.ecr.us-east-1.amazonaws.com/techno-api:latest


  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_KEY }}
          aws-region: us-east-1

      - name: Install kubectl
        run: |
          curl -o kubectl https://s3.us-west-2.amazonaws.com/amazon-eks/1.27.0/2023-09-14/bin/linux/amd64/kubectl
          chmod +x kubectl
          sudo mv kubectl /usr/local/bin/

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig --region us-east-1 --name techno-cluster

      - name: Test K8s connection
        run: |
          kubectl get pods

      - name: Restart Deployment
        run: |
          kubectl rollout restart deployment techno-api